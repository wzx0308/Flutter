name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wzx0308/flutter/backend
  DEPLOY_PATH: /opt/social-app

jobs:
  # ============================================================
  # Job 1: Backend - Lint, Test, Build, Push Docker Image
  # ============================================================
  backend:
    name: Backend CI/CD
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint
        working-directory: ./backend
        run: npm run lint

      - name: Run tests
        working-directory: ./backend
        run: npm test -- --passWithNoTests

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ============================================================
  # Job 2: Flutter Web - Analyze, Build
  # ============================================================
  flutter-web:
    name: Flutter Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: ./flutter
        run: flutter pub get

      - name: Flutter analyze
        working-directory: ./flutter
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build Flutter Web
        working-directory: ./flutter
        run: flutter build web --release --base-href /social/

      - name: Upload Flutter Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: flutter/build/web/
          retention-days: 3

  # ============================================================
  # Job 3: Deploy to Server (only on main branch push)
  # ============================================================
  deploy:
    name: Deploy to Server
    needs: [backend, flutter-web]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Flutter Web artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: flutter-web-build/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 22 }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload docker-compose.prod.yml to server
        run: |
          scp -i ~/.ssh/deploy_key \
              -P ${{ secrets.DEPLOY_PORT || 22 }} \
              docker-compose.prod.yml \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Generate .env on server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_PORT || 22 }} \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "cat > ${{ env.DEPLOY_PATH }}/.env" << 'EOF'
          POSTGRES_DB=social_app
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRES=2h
          JWT_REFRESH_EXPIRES=7d
          APP_PORT=3000
          NODE_ENV=production
          DATABASE_URL=postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@db:5432/social_app
          REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379
          ALIPAY_APP_ID=${{ secrets.ALIPAY_APP_ID }}
          ALIPAY_GATEWAY=https://openapi-sandbox.dl.alipaydev.com/gateway.do
          ALIPAY_NOTIFY_URL=http://39.106.1.97:3100/api/wallet/alipay/notify
          ALIPAY_APP_PUBLIC_KEY=${{ secrets.ALIPAY_APP_PUBLIC_KEY }}
          ALIPAY_PUBLIC_KEY=${{ secrets.ALIPAY_PUBLIC_KEY }}
          ALIPAY_PRIVATE_KEY=${{ secrets.ALIPAY_PRIVATE_KEY }}
          ALIPAY_SIGN_TYPE=RSA2
          AI_API_KEY=${{ secrets.AI_API_KEY }}
          AI_BASE_URL=https://api.xiaomimimo.com/v1
          AGORA_APP_ID=${{ secrets.AGORA_APP_ID }}
          AGORA_APP_CERTIFICATE=${{ secrets.AGORA_APP_CERTIFICATE }}
          EOF

      - name: Upload Nginx config
        run: |
          scp -i ~/.ssh/deploy_key \
              -P ${{ secrets.DEPLOY_PORT || 22 }} \
              nginx/social-app.conf \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/nginx/

      - name: Upload Flutter Web build
        run: |
          scp -r -i ~/.ssh/deploy_key \
              -P ${{ secrets.DEPLOY_PORT || 22 }} \
              flutter-web-build/ \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/flutter-web/

      - name: Pull image and deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_PORT || 22 }} \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY_EOF'
          set -e
          cd /opt/social-app

          # Pull the latest backend image
          docker pull ghcr.io/wzx0308/flutter/backend:latest

          # Restart all services
          docker compose -f docker-compose.prod.yml up -d --force-recreate

          # Wait for services
          sleep 15

          # Verify services are running
          docker compose -f docker-compose.prod.yml ps

          # Reload Nginx
          sudo nginx -t && sudo systemctl reload nginx

          echo "Deployment complete!"
          DEPLOY_EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
