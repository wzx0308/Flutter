name: social_app
description: "Social community app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  web: ^1.0.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  dio: ^5.4.0
  get_storage: ^2.1.1
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  flutter_screenutil: ^5.9.0
  file_picker: ^8.0.0
  pull_to_refresh: ^2.0.0
  socket_io_client: ^2.0.3+1
  google_fonts: ^6.1.0
  flutter_slidable: ^3.1.1
  qr_flutter: ^4.1.0
  uuid: ^4.5.0
  record: ^5.0.4
  audioplayers: ^6.1.0
  speech_to_text: ^7.0.0
  path_provider: 2.1.5
  flutter_3d_controller: ^2.0.0
  model_viewer_plus: ^1.7.1
  flutter_localizations:
    sdk: flutter
  intl: any
  agora_rtc_engine: ^6.5.4
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  path_provider_android: 2.2.7

flutter:
  uses-material-design: true
  assets:
    - assets/3d/
    - assets/sounds/
