# ============================================================
# Social App (安隅) - Nginx Reverse Proxy
# Port 8080: API + WebSocket + Flutter Web
# ============================================================

upstream social_backend {
    server 127.0.0.1:3100;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;

    # Client body size for file uploads
    client_max_body_size 50m;

    # Backend API
    location /api/ {
        proxy_pass http://social_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
        proxy_pass http://social_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Uploads (static files served by backend)
    location /uploads/ {
        proxy_pass http://social_backend/uploads/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Flutter Web
    location /social/ {
        alias /opt/social-app/flutter-web/;
        try_files $uri $uri/ /social/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Redirect root to Flutter Web
    location = / {
        return 302 /social/;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
